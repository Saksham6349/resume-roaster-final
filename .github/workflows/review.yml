name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  trigger-review:
    name: Trigger AI Review
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Send PR to Review Bot
        env:
          BOT_URL: ${{ secrets.REVIEW_BOT_URL }}
          WEBHOOK_SECRET: ${{ secrets.GITHUB_WEBHOOK_SECRET }}
        run: |
          PAYLOAD=$(cat <<EOF
          {
            "action": "${{ github.event.action }}",
            "pull_request": {
              "number": ${{ github.event.pull_request.number }},
              "title": "${{ github.event.pull_request.title }}",
              "user": { "login": "${{ github.event.pull_request.user.login }}" },
              "base": { "sha": "${{ github.event.pull_request.base.sha }}" },
              "head": { "sha": "${{ github.event.pull_request.head.sha }}" }
            },
            "repository": {
              "full_name": "${{ github.repository }}"
            }
          }
          EOF
          )

          SIGNATURE=$(echo -n "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print "sha256="$2}')

          curl -s -X POST "$BOT_URL/webhook" \
            -H "Content-Type: application/json" \
            -H "X-GitHub-Event: pull_request" \
            -H "X-Hub-Signature-256: $SIGNATURE" \
            -d "$PAYLOAD"

      - name: Wait for review
        run: echo "Review triggered. Check PR comments for AI feedback."
